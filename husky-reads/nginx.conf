server {
    listen ${PORT};
    root /usr/share/nginx/html;
    index index.html;

    # Serve static assets with caching
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: all unmatched routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
